name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: "1.25"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build: 编译 Go 程序（多架构）
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: |
          BINARY=komari-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF#refs/tags/}" \
            -o ${BINARY} ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: komari-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: komari-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Test: 运行测试
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test -v -race ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker: 构建并推送镜像
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_type == 'tag' || github.ref == 'refs/heads/main')
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: komari-mcp-linux-${{ matrix.arch }}
          path: .

      - name: Prepare binary
        run: |
          mv komari-mcp-linux-${{ matrix.arch }} komari-mcp
          chmod +x komari-mcp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Push latest tag (amd64, tag release only)
        if: matrix.arch == 'amd64' && github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Manifest: 合并多架构镜像
  # ─────────────────────────────────────────────────────────────────────────────
  manifest:
    needs: [docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_type == 'tag' || github.ref == 'refs/heads/main')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Create and push manifest
        run: |
          TAGS='${{ steps.meta.outputs.tags }}'
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "${tag}" \
              "${tag}-amd64" "${tag}-arm64"
          done <<< "$TAGS"
